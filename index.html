<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta name="description" content="Site consumindo API do desenho Rick and Morty">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="Rick and Morty, Consumo Api, API">
    <meta name="author" content="1brenoalv">
    <meta name="robots" content="index, follow">
    <link rel="shortcut icon" href="./assets/icon/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/loading.css">
    <title>Rick and Morty</title>
</head>

<body>
    <header>
        <div id="logo-header">
            <div id="img-logo"></div>
            <h1>Rick and Morty Explorer</h1>
        </div>
        <div id="hours-header">
            <span>Data Indisponivel</span>
        </div>
    </header>
    <div id="container-main">
        <aside>
            <form id="form-filter">
                <div id="search">
                    <span for="search" class="label-filter">Buscar</span>
                    <input type="search" id="inp-search" placeholder="Buscar por nome...">
                </div>
                <div id="inp-filter">
                    <label for="filter-status" class="label-filter">Filtros</label>
                    <select name="filter-status" id="filter-status" class="">
                        <option value=""  selected>Todos os status</option>
                        <option value="alive">Alive</option>
                        <option value="dead">Dead</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <select name="filter-status" id="filter-species" class="">
                        <option value=""  selected>Todas as espécies</option>
                        <option value="human">Human</option>
                        <option value="alien">Alien</option>
                    </select>
                    <select name="filter-status" id="filter-gender" class="">
                        <option value=""  selected>Todos os gêneros</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="genderless">Genderless</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <div id="btn-filter">
                        <button id="apply-filter"  type="submit">Aplicar</button>
                        <button id="clear-filter"  type="reset">Limpar Filtros</button>
                    </div>
                </div>
            </form>
            <div id="legend-aside">
                <span class="label-filter">Legenda</span>
                <ul id="list-legend">
                    <li>
                        <span class="status-person alive"></span>
                        Alive
                    </li>
                    <li>
                        <span class="status-person dead"></span>
                        Dead
                    </li>
                    <li>
                        <span class="status-person unknown"></span>
                        Unknown
                    </li>
                </ul>
            </div>
        </aside>
        <main>
            <section>
                <div id="list-person"></div>
            </section>
            <section id="btns"></section>
        </main>
    </div>
    <dialog id="modal-person">
        <div id="img-modal">
        </div>
        <div id="info-modal">
            <div id="name-modal">
                <span id="space-name-modal"></span>
            </div>
            <div id="type-modal">
                <span class="status-modal unknown"></span>
                <span id="gander-modal"></span>
            </div>
            <div id="location-modal">
                <div ><span class="left-modal">Origem</span> <span class="right-modal"></span></div>
                <div ><span class="left-modal">Localização</span> <span class="right-modal"></span></div>
                <div ><span class="left-modal">Episódios</span> <span class="right-modal"></span></div>
            </div>
            <div id="close-modal">
                <button id="btn-close">Fechar</button>
            </div>
        </div>
    </dialog>

    <script src="./js/main.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/services.js"></script>
</body>

</html>
